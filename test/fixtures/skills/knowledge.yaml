# Skill/procedure test fixture (#100). Local, no serving/federation block so
# the planner needs no network. Two skills: one granted, one fail-closed.
kcp_version: "0.25"
project: skill-fixture
version: 1.0.0
updated: "2026-07-17"
language: en

units:
  - id: deploy-skill
    path: skills/deploy.md
    kind: skill
    intent: "Deploy the service to production safely"
    scope: module
    audience: [agent]
    triggers: [deploy, release, production]
    load_eligible: true
    action_scope:
      tools: [Bash]
      paths: [infra/]
      capabilities: [deploy]

  - id: docs-viewer-skill
    path: skills/docs-viewer.md
    kind: skill
    intent: "Read the deploy documentation and runbooks"
    scope: module
    audience: [agent]
    triggers: [deploy, docs, documentation, runbook, read]
    load_eligible: true
    action_scope:
      tools: [Read, Grep]
      paths: [docs/, skills/]

  - id: procurement-skill
    path: skills/procurement.md
    kind: skill
    intent: "Purchase approved supplies from authorized vendors within budget"
    scope: module
    audience: [agent]
    triggers: [purchase, buy, procure, vendor, order, supplies]
    load_eligible: true
    action_scope:
      tools: [purchase]
      spend:
        max_spend: 500
        allowed_vendors: [acme-supplies, globex]
        currency: USD

  - id: rotate-secrets-skill
    path: skills/rotate-secrets.md
    kind: skill
    intent: "Rotate production secrets during a deploy"
    scope: module
    audience: [agent]
    triggers: [deploy, release, production, rotate, secret]
    action_scope:
      tools: [Bash]
      paths: [secrets/]

  - id: deploy-runbook
    path: docs/deploy-runbook.md
    intent: "Human-readable deploy runbook documentation"
    scope: module
    audience: [agent, human]
    triggers: [deploy, runbook, docs]
